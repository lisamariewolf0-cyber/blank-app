name: Daily Pipeline

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Netzwerk und Secrets prüfen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          echo "=== DNS Grundtest ==="
          nslookup google.com
          echo "=== Supabase URL Länge ==="
          echo ${#SUPABASE_URL} Zeichen
          echo "=== Supabase URL Prefix ==="
          echo ${SUPABASE_URL:0:30}
          echo "=== Supabase erreichbar? ==="
          curl -v --max-time 10 "$SUPABASE_URL" || echo "FEHLER"

      - name: Pipeline ausführen
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY:   ${{ secrets.NEWSAPI_KEY }}
        run: python run_pipeline.py
