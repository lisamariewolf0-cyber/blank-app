name: Daily Pipeline

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Netzwerk testen
        run: |
          echo "=== DNS Test ==="
          nslookup api.groq.com || echo "DNS fehlgeschlagen"
          echo "=== Ping Test ==="
          curl -v --max-time 10 https://api.groq.com || echo "Groq nicht erreichbar"
          echo "=== Supabase Test ==="
          curl -v --max-time 10 ${{ secrets.SUPABASE_URL }} || echo "Supabase nicht erreichbar"

      - name: Pipeline ausführen
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY:   ${{ secrets.NEWSAPI_KEY }}
        run: python run_pipeline.py
