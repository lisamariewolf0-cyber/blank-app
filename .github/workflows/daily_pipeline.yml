name: Daily Pipeline

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Secrets prüfen
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY:   ${{ secrets.NEWSAPI_KEY }}
        run: |
          echo "SUPABASE_URL gesetzt: $( [ -n "$SUPABASE_URL" ] && echo JA || echo NEIN )"
          echo "SUPABASE_KEY gesetzt: $( [ -n "$SUPABASE_KEY" ] && echo JA || echo NEIN )"
          echo "GROQ_API_KEY gesetzt: $( [ -n "$GROQ_API_KEY" ] && echo JA || echo NEIN )"
          echo "NEWSAPI_KEY gesetzt:  $( [ -n "$NEWSAPI_KEY" ] && echo JA || echo NEIN )"
          python -c "import httpx; r = httpx.get('https://api.groq.com'); print('Groq erreichbar:', r.status_code)"

      - name: Pipeline ausführen
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY:   ${{ secrets.NEWSAPI_KEY }}
        run: python run_pipeline.py
